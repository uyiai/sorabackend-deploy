# ===========================================
# Sora Backend - Pro Edition
# Modules: conversation, billing + video, image, music,
#          creative_studio, agents, sms, support
# Usage: docker compose up -d
# ===========================================

x-django-common: &django-common
  env_file:
    - .env
  environment: &django-env
    DJANGO_SETTINGS_MODULE: sorabackend.settings_production
    DEBUG: "False"
    DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/sorabackend"
    REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
    LICENSE_KEY: "${LICENSE_KEY}"
  depends_on: &django-depends
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ---------- Infrastructure ----------
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sorabackend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres -d sorabackend
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly no --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: redis-cli -a "${REDIS_PASSWORD}" ping
      interval: 5s
      retries: 10

  # ---------- Backend ----------
  web:
    <<: *django-common
    image: ghcr.io/uyiai/sorabackend:latest-pro
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8000"
    volumes:
      - static_volume:/code/static_root
      - media_volume:/code/media
      - license_data:/code/data
    healthcheck:
      test: curl --fail "http://localhost:8000/health/?token=${HEALTH_CHECK_TOKENS:-}" || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-default:
    <<: *django-common
    image: ghcr.io/uyiai/sorabackend:latest-pro
    command: >-
      celery -A sorabackend worker -l INFO -Q celery,billing -c ${CELERY_DEFAULT_CONCURRENCY:-300} --pool threads
    restart: unless-stopped
    volumes:
      - license_data:/code/data
    depends_on:
      <<: *django-depends
      web:
        condition: service_started

  celery-creative-studio:
    <<: *django-common
    image: ghcr.io/uyiai/sorabackend:latest-pro
    command: >-
      celery -A sorabackend worker -l INFO -Q creative_studio -c ${CELERY_STUDIO_CONCURRENCY:-300} --pool threads
    restart: unless-stopped
    volumes:
      - license_data:/code/data
    depends_on:
      <<: *django-depends
      web:
        condition: service_started

  celery-beat:
    <<: *django-common
    image: ghcr.io/uyiai/sorabackend:latest-pro
    command: >-
      celery -A sorabackend beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    volumes:
      - license_data:/code/data
    depends_on:
      <<: *django-depends
      web:
        condition: service_started

  # ---------- Frontend ----------
  frontend:
    image: ghcr.io/uyiai/sorabackend-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - web

  # ---------- Monitoring ----------
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    # Fix: Go DNS resolver needs search domain to resolve short service names
    dns_search:
      - pro_default
    dns_opt:
      - ndots:1
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"
    depends_on:
      web:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-SoraMonitor2026}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-13001}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  static_volume:
  media_volume:
  license_data:
  prometheus_data:
  grafana_data:
